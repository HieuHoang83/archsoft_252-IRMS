server:
  port: 8084

spring:
  application:
    name: kitchen-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/irms_kitchen
    username: ${POSTGRES_USER:irms_user}
    password: ${POSTGRES_PASSWORD:irms_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        
clients:
  order-service:
    base-url: ${ORDER_SERVICE_URL:http://localhost:8083}
  inventory-service:
    base-url: ${INVENTORY_SERVICE_URL:http://localhost:8086}
