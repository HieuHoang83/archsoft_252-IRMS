version: "3.8"

services:
  # --- Core Domain Services ---
  admin-service:
    build:
      context: .
      dockerfile: services/admin-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/irms_auth
      - POSTGRES_USER=irms_user
      - POSTGRES_PASSWORD=irms_pass
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: on-failure
    networks:
      - irms-network

  menu-service:
    build:
      context: .
      dockerfile: services/menu-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/irms_menu
      - POSTGRES_USER=irms_user
      - POSTGRES_PASSWORD=irms_pass
    depends_on:
      postgres-db:
        condition: service_healthy
    restart: on-failure
    networks:
      - irms-network

  # --- Data Layer ---
  postgres-db:
    image: postgres:15
    environment:
      - POSTGRES_USER=irms_user
      - POSTGRES_PASSWORD=irms_pass
      - POSTGRES_MULTIPLE_DATABASES=irms_auth,irms_order,irms_menu,irms_kitchen,irms_table,irms_inventory,irms_payment
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U irms_user -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - irms-network

  # redis-cache:
  #   image: redis:7
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - irms-network

  # rabbitmq:
  #   image: rabbitmq:3.12-management
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"
  #   environment:
  #     - RABBITMQ_DEFAULT_USER=guest
  #     - RABBITMQ_DEFAULT_PASS=guest
  #   networks:
  #     - irms-network

networks:
  irms-network:
    driver: bridge

volumes:
  postgres_data:
